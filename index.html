<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Fragancias</title>

    <!-- Error Handler -->
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            const errorDiv = document.getElementById('error-display');
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML += `<div><strong>Error:</strong> ${message} at ${source}:${lineno}</div>`;
            }
        };
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#ec4899',
                        dark: '#0f172a',
                        card: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- DATA LOADING -->
    <script src="data.js"></script>
</head>

<body class="bg-slate-900 text-white font-sans min-h-screen">
    <div id="error-display"
        style="display:none; background: #ef4444; color: white; padding: 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
    </div>
    <div id="root"></div>

    <!-- App Logic Inlined -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Translations & Mappings ---

        const TERM_TRANSLATIONS = {
            // Families & Accords
            "woody": "Amaderado", "citrus": "Cítrico", "floral": "Floral", "amber": "Ámbar",
            "spicy": "Especiado", "fresh": "Fresco", "musky": "Almizclado", "fruity": "Afrutado",
            "aromatic": "Aromático", "green": "Verde", "powdery": "Atalcado", "sweet": "Dulce",
            "vanilla": "Vainilla", "earthy": "Terroso", "rose": "Rosa", "white floral": "Floral Blanco",
            "balsamic": "Balsámico", "leather": "Cuero", "oud": "Oud", "tobacco": "Tabaco",
            "smoky": "Ahumado", "aquatic": "Acuático", "marine": "Marino", "ozonic": "Ozónico",
            "tropical": "Tropical", "animalic": "Animal", "herbal": "Herbal", "mossy": "Musgoso",
            "warm spicy": "Especiado Cálido", "fresh spicy": "Especiado Fresco", "soft spicy": "Especiado Suave",
            "patchouli": "Pachulí", "iris": "Iris", "violet": "Violeta", "lavender": "Lavanda",

            // Common Ingredients
            "bergamot": "Bergamota", "lemon": "Limón", "orange": "Naranja", "mandarin": "Mandarina",
            "grapefruit": "Pomelo", "lime": "Lima", "apple": "Manzana", "pear": "Pera",
            "peach": "Melocotón", "black currant": "Grosella Negra", "pineapple": "Piña",
            "coconut": "Coco", "jasmine": "Jazmín", "tuberose": "Nardo", "lily": "Lirio",
            "ylang-ylang": "Ylang-Ylang", "geranium": "Geranio", "neroli": "Neroli",
            "sandalwood": "Sándalo", "cedar": "Cedro", "vetiver": "Vetiver", "oakmoss": "Musgo de Roble",
            "tonka bean": "Haba Tonka", "cinnamon": "Canela", "cardamom": "Cardamomo",
            "ginger": "Jengibre", "pepper": "Pimienta", "clove": "Clavo", "nutmeg": "Nuez Moscada",
            "saffron": "Azafrán", "honey": "Miel", "coffee": "Café", "chocolate": "Chocolate",
            "almond": "Almendra", "mint": "Menta", "basil": "Albahaca", "sage": "Salvia",
            "rosemary": "Romero", "thyme": "Tomillo", "incense": "Incienso", "myrrh": "Mirra",
            "benzoin": "Benjuí", "labdanum": "Ládano", "rum": "Ron", "cognac": "Coñac"
        };

        const TRANSLATIONS = {
            gender: {
                "men": "Hombre", "women": "Mujer", "women and men": "Unisex",
                "more male": "Más Masculino", "more female": "Más Femenino",
                "male": "Masculino", "female": "Femenino", "unisex": "Unisex"
            },
            price: {
                "way overpriced": "Muy Caro", "overpriced": "Caro", "ok": "Precio Justo",
                "good value": "Buen Valor", "great value": "Gran Valor"
            },
            longevity: {
                "very weak": "Muy Débil", "weak": "Débil", "moderate": "Moderada",
                "long lasting": "Duradera", "eternal": "Eterna"
            },
            sillage: {
                "intimate": "Íntima", "moderate": "Moderada", "strong": "Fuerte", "enormous": "Enorme"
            }
        };

        const PRICE_ORDER = ["Gran Valor", "Buen Valor", "Precio Justo", "Caro", "Muy Caro"];
        const SILLAGE_ORDER = ["Íntima", "Moderada", "Fuerte", "Enorme"];
        const LONGEVITY_ORDER = ["Muy Débil", "Débil", "Moderada", "Duradera", "Eterna"];

        const translate = (category, value) => {
            if (!value) return "Desconocido";
            const lowerVal = String(value).toLowerCase();
            return TRANSLATIONS[category]?.[lowerVal] || value;
        };

        const translateText = (text) => {
            if (!text) return "";
            return text.split(/,\s*/).map(part => {
                const lower = part.toLowerCase().trim();
                if (TERM_TRANSLATIONS[lower]) return TERM_TRANSLATIONS[lower];
                for (const [eng, esp] of Object.entries(TERM_TRANSLATIONS)) {
                    if (lower.includes(eng)) {
                        return part.replace(new RegExp(eng, 'gi'), esp);
                    }
                }
                return part;
            }).join(", ");
        };

        // --- Helper Components ---

        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const KPICard = ({ title, value, iconName, color }) => (
            <div className="glass-panel p-6 rounded-xl card-hover">
                <div className="flex items-center justify-between mb-4">
                    <h3 className="text-slate-400 text-sm font-medium uppercase tracking-wider">{title}</h3>
                    <div className={`p-2 rounded-lg bg-${color}-500/10 text-${color}-400`}>
                        <Icon name={iconName} size={20} />
                    </div>
                </div>
                <div className="text-3xl font-bold text-white">{value}</div>
            </div>
        );

        const SimpleBarChart = ({ data, color = "emerald" }) => {
            if (!data || data.length === 0) return <div className="text-slate-500 italic">No hay datos disponibles</div>;

            const maxVal = Math.max(...data.map(d => d.value));
            return (
                <div className="space-y-3">
                    {data.map((d, i) => (
                        <div key={i} className="flex items-center gap-4 group">
                            <div className="w-32 text-sm text-slate-400 text-right truncate group-hover:text-white transition-colors" title={d.name}>{d.name}</div>
                            <div className="flex-1 h-4 bg-slate-800 rounded-full overflow-hidden">
                                <div
                                    className={`h-full bg-${color}-500 rounded-full transition-all duration-1000 ease-out group-hover:bg-${color}-400`}
                                    style={{ width: `${(d.value / maxVal) * 100}%` }}
                                ></div>
                            </div>
                            <div className="w-16 text-sm font-medium text-slate-300 text-right">{d.value.toLocaleString()}</div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- Dashboard ---

        const Dashboard = ({ data }) => {
            const stats = useMemo(() => {
                const total = data.length;
                const brands = new Set(data.map(d => d.marca)).size;
                const avgRating = (data.reduce((acc, curr) => acc + (curr.rating || 0), 0) / total).toFixed(2);

                // Helper for counts
                const getCounts = (key, translator, order) => {
                    const counts = {};
                    data.forEach(d => {
                        const val = translator ? translate(translator, d[key]) : d[key];
                        counts[val] = (counts[val] || 0) + 1;
                    });
                    let res = Object.entries(counts).map(([name, value]) => ({ name, value }));
                    if (order) {
                        res.sort((a, b) => order.indexOf(a.name) - order.indexOf(b.name));
                    } else {
                        res.sort((a, b) => b.value - a.value);
                    }
                    return res;
                };

                const genderData = getCounts('genero', 'gender');
                const priceData = getCounts('precio', 'price', PRICE_ORDER);
                const longevityData = getCounts('longevidad', 'longevity', LONGEVITY_ORDER);
                const sillageData = getCounts('estela', 'sillage', SILLAGE_ORDER);

                // Top Brands
                const brandCounts = {};
                data.forEach(d => {
                    const b = d.marca || "Desconocida";
                    brandCounts[b] = (brandCounts[b] || 0) + 1;
                });
                const topBrands = Object.entries(brandCounts)
                    .map(([name, value]) => ({ name, value }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 5);

                // Top Notes (Individual ingredients)
                const noteCounts = {};
                data.forEach(d => {
                    const allNotes = [d.notas_salida, d.notas_corazon, d.notas_fondo].filter(Boolean).join(', ');
                    allNotes.split(',').forEach(n => {
                        const note = translateText(n.trim());
                        if (note.length > 2) noteCounts[note] = (noteCounts[note] || 0) + 1;
                    });
                });
                const topNotes = Object.entries(noteCounts)
                    .map(([name, value]) => ({ name, value }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 5);

                // Top Rated Fragrances (min 50 votes)
                const topRated = data
                    .filter(d => (d.num_votos || 0) > 50)
                    .sort((a, b) => b.rating - a.rating)
                    .slice(0, 5);

                return { total, brands, avgRating, genderData, priceData, longevityData, sillageData, topBrands, topNotes, topRated };
            }, [data]);

            return (
                <div className="space-y-6 animate-fade-in pb-12">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <KPICard title="Total Fragancias" value={stats.total.toLocaleString()} iconName="droplet" color="indigo" />
                        <KPICard title="Marcas Únicas" value={stats.brands.toLocaleString()} iconName="star" color="pink" />
                        <KPICard title="Valoración Media" value={stats.avgRating} iconName="star" color="yellow" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass-panel p-6 rounded-xl">
                            <h3 className="text-lg font-semibold mb-6 flex items-center gap-2">
                                <Icon name="users" size={20} className="text-indigo-400" /> Distribución por Género
                            </h3>
                            <SimpleBarChart data={stats.genderData} color="indigo" />
                        </div>

                        <div className="glass-panel p-6 rounded-xl">
                            <h3 className="text-lg font-semibold mb-6 flex items-center gap-2">
                                <Icon name="dollar-sign" size={20} className="text-emerald-400" /> Percepción de Precio
                            </h3>
                            <SimpleBarChart data={stats.priceData} color="emerald" />
                        </div>

                        <div className="glass-panel p-6 rounded-xl">
                            <h3 className="text-lg font-semibold mb-6 flex items-center gap-2">
                                <Icon name="clock" size={20} className="text-blue-400" /> Duración
                            </h3>
                            <SimpleBarChart data={stats.longevityData} color="blue" />
                        </div>

                        <div className="glass-panel p-6 rounded-xl">
                            <h3 className="text-lg font-semibold mb-6 flex items-center gap-2">
                                <Icon name="wind" size={20} className="text-purple-400" /> Estela
                            </h3>
                            <SimpleBarChart data={stats.sillageData} color="purple" />
                        </div>

                        <div className="glass-panel p-6 rounded-xl">
                            <h3 className="text-lg font-semibold mb-6 flex items-center gap-2">
                                <Icon name="crown" size={20} className="text-amber-400" /> Top Marcas
                            </h3>
                            <SimpleBarChart data={stats.topBrands} color="amber" />
                        </div>

                        <div className="glass-panel p-6 rounded-xl">
                            <h3 className="text-lg font-semibold mb-6 flex items-center gap-2">
                                <Icon name="flower-2" size={20} className="text-rose-400" /> Notas Más Comunes
                            </h3>
                            <SimpleBarChart data={stats.topNotes} color="rose" />
                        </div>
                    </div>

                    {/* Top Rated Table */}
                    <div className="glass-panel p-6 rounded-xl">
                        <h3 className="text-lg font-semibold mb-6 flex items-center gap-2">
                            <Icon name="trophy" size={20} className="text-yellow-400" /> Top 5 Fragancias Mejor Valoradas (+50 votos)
                        </h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="text-slate-400 text-xs uppercase border-b border-slate-700">
                                    <tr>
                                        <th className="pb-3">Nombre</th>
                                        <th className="pb-3">Marca</th>
                                        <th className="pb-3">Valoración</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {stats.topRated.map((item, idx) => (
                                        <tr key={idx} className="hover:bg-slate-800/50">
                                            <td className="py-3 font-medium">{item.nombre_completo}</td>
                                            <td className="py-3 text-slate-400">{item.marca}</td>
                                            <td className="py-3 text-yellow-400 font-bold">{item.rating}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Explorer ---

        const FilterSection = ({ title, children, isOpen = true }) => {
            const [open, setOpen] = useState(isOpen);
            return (
                <div className="border-b border-slate-700/50 py-4 last:border-0">
                    <button
                        className="flex items-center justify-between w-full text-left mb-2 group"
                        onClick={() => setOpen(!open)}
                    >
                        <h4 className="text-sm font-bold text-slate-300 uppercase tracking-wider group-hover:text-white transition-colors">{title}</h4>
                        <Icon name={open ? "chevron-up" : "chevron-down"} size={16} className="text-slate-500 group-hover:text-white" />
                    </button>
                    {open && <div className="space-y-2 animate-fade-in">{children}</div>}
                </div>
            );
        };

        const CheckboxList = ({ options, selected, onChange, search = false }) => {
            const [term, setTerm] = useState("");

            const filteredOptions = useMemo(() => {
                if (!search) return options;
                return options.filter(o => o.label.toLowerCase().includes(term.toLowerCase()));
            }, [options, term, search]);

            return (
                <div>
                    {search && (
                        <div className="relative mb-2">
                            <input
                                type="text"
                                placeholder="Buscar..."
                                className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs text-white focus:border-indigo-500 outline-none"
                                value={term}
                                onChange={e => setTerm(e.target.value)}
                            />
                        </div>
                    )}
                    <div className="max-h-40 overflow-y-auto custom-scrollbar pr-2 space-y-1">
                        {filteredOptions.length > 0 ? filteredOptions.map(opt => (
                            <label key={opt.value} className="flex items-center gap-3 cursor-pointer group hover:bg-slate-800/50 p-1 rounded transition-colors">
                                <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors flex-shrink-0 ${selected.includes(opt.value) ? 'bg-indigo-500 border-indigo-500' : 'border-slate-600 group-hover:border-indigo-400'}`}>
                                    {selected.includes(opt.value) && <Icon name="check" size={12} className="text-white" />}
                                </div>
                                <input
                                    type="checkbox"
                                    className="hidden"
                                    checked={selected.includes(opt.value)}
                                    onChange={() => onChange(opt.value)}
                                />
                                <span className={`text-sm truncate ${selected.includes(opt.value) ? 'text-white font-medium' : 'text-slate-400 group-hover:text-slate-300'}`}>
                                    {opt.label} <span className="text-xs text-slate-600 ml-1">({opt.count})</span>
                                </span>
                            </label>
                        )) : <div className="text-xs text-slate-500 p-1">No hay resultados</div>}
                    </div>
                </div>
            );
        };

        const RangeFilter = ({ label, min, max, value, onChange, step = 1 }) => (
            <div className="px-1">
                <div className="flex justify-between text-xs text-slate-400 mb-2">
                    <span>{label}</span>
                    <span className="text-white font-bold">{value}+</span>
                </div>
                <input
                    type="range"
                    min={min}
                    max={max}
                    step={step}
                    value={value}
                    onChange={(e) => onChange(Number(e.target.value))}
                    className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500"
                />
            </div>
        );

        const Explorer = ({ data, onViewDetails }) => {
            const [searchTerm, setSearchTerm] = useState("");
            const [page, setPage] = useState(1);
            const [showFilters, setShowFilters] = useState(false);

            // Filter State
            const [selectedBrands, setSelectedBrands] = useState([]);
            const [selectedGenders, setSelectedGenders] = useState([]);
            const [selectedPrices, setSelectedPrices] = useState([]);
            const [selectedSillage, setSelectedSillage] = useState([]);
            const [selectedLongevity, setSelectedLongevity] = useState([]);
            const [selectedPerfumers, setSelectedPerfumers] = useState([]);
            const [selectedAccords, setSelectedAccords] = useState([]);
            const [selectedNotes, setSelectedNotes] = useState([]);
            const [minRating, setMinRating] = useState(0);
            const [minVotes, setMinVotes] = useState(0);

            // Sort State
            const [sortBy, setSortBy] = useState("rating"); // rating, votes, price_val
            const [sortOrder, setSortOrder] = useState("desc");

            const itemsPerPage = 20;

            // Extract Filter Options
            const filterOptions = useMemo(() => {
                const brands = {};
                const genders = {};
                const prices = {};
                const sillage = {};
                const longevity = {};
                const perfumers = {};
                const accords = {};
                const notes = {};

                data.forEach(item => {
                    // Basic
                    const b = item.marca || "Otros";
                    brands[b] = (brands[b] || 0) + 1;

                    const g = translate('gender', item.genero);
                    genders[g] = (genders[g] || 0) + 1;

                    const p = translate('price', item.precio);
                    prices[p] = (prices[p] || 0) + 1;

                    const s = translate('sillage', item.estela);
                    sillage[s] = (sillage[s] || 0) + 1;

                    const l = translate('longevity', item.longevidad);
                    longevity[l] = (longevity[l] || 0) + 1;

                    if (item.perfumista) {
                        item.perfumista.split(',').forEach(perf => {
                            const pName = perf.trim();
                            if (pName) perfumers[pName] = (perfumers[pName] || 0) + 1;
                        });
                    }

                    // Accords
                    if (item.main_accords) {
                        item.main_accords.split(',').forEach(a => {
                            const acc = translateText(a.trim());
                            accords[acc] = (accords[acc] || 0) + 1;
                        });
                    }

                    // Notes
                    const allNotes = [item.notas_salida, item.notas_corazon, item.notas_fondo].filter(Boolean).join(', ');
                    allNotes.split(',').forEach(n => {
                        const note = translateText(n.trim());
                        if (note.length > 2) {
                            notes[note] = (notes[note] || 0) + 1;
                        }
                    });
                });

                // Helper to format options
                const toOpts = (obj, order) => {
                    let res = Object.entries(obj).map(([k, v]) => ({ value: k, label: k, count: v }));
                    if (order) {
                        res.sort((a, b) => order.indexOf(a.value) - order.indexOf(b.value));
                    } else {
                        res.sort((a, b) => b.count - a.count);
                    }
                    return res;
                };

                return {
                    brands: toOpts(brands),
                    genders: toOpts(genders),
                    prices: toOpts(prices, PRICE_ORDER),
                    sillage: toOpts(sillage, SILLAGE_ORDER),
                    longevity: toOpts(longevity, LONGEVITY_ORDER),
                    perfumers: toOpts(perfumers),
                    accords: toOpts(accords).slice(0, 100),
                    notes: toOpts(notes).slice(0, 200)
                };
            }, [data]);

            const handleFilterChange = (setter, list, value) => {
                setter(prev => prev.includes(value) ? prev.filter(i => i !== value) : [...prev, value]);
                setPage(1);
            };

            const filteredAndSortedData = useMemo(() => {
                let res = data.filter(item => {
                    // Search
                    const searchLower = searchTerm.toLowerCase();
                    const matchesSearch = !searchTerm || (
                        String(item.nombre_completo || "").toLowerCase().includes(searchLower) ||
                        String(item.marca || "").toLowerCase().includes(searchLower) ||
                        String(item.main_accords || "").toLowerCase().includes(searchLower) ||
                        String(item.perfumista || "").toLowerCase().includes(searchLower)
                    );

                    // Basic Filters
                    const matchesBrand = selectedBrands.length === 0 || selectedBrands.includes(item.marca);
                    const matchesGender = selectedGenders.length === 0 || selectedGenders.includes(translate('gender', item.genero));
                    const matchesPrice = selectedPrices.length === 0 || selectedPrices.includes(translate('price', item.precio));
                    const matchesSillage = selectedSillage.length === 0 || selectedSillage.includes(translate('sillage', item.estela));
                    const matchesLongevity = selectedLongevity.length === 0 || selectedLongevity.includes(translate('longevity', item.longevidad));

                    // Perfumer Filter
                    let matchesPerfumer = true;
                    if (selectedPerfumers.length > 0) {
                        const itemPerfumers = String(item.perfumista || "").split(',').map(p => p.trim());
                        matchesPerfumer = selectedPerfumers.some(p => itemPerfumers.includes(p));
                    }

                    // Numeric Filters
                    const matchesRating = (item.rating || 0) >= minRating;
                    const matchesVotes = (item.num_votos || 0) >= minVotes;

                    // Complex Filters
                    let matchesAccords = true;
                    if (selectedAccords.length > 0) {
                        const itemAccords = String(item.main_accords || "").split(',').map(a => translateText(a.trim()));
                        matchesAccords = selectedAccords.some(acc => itemAccords.includes(acc));
                    }

                    let matchesNotes = true;
                    if (selectedNotes.length > 0) {
                        const itemNotes = translateText([item.notas_salida, item.notas_corazon, item.notas_fondo].join(', '));
                        matchesNotes = selectedNotes.some(note => itemNotes.includes(note));
                    }

                    return matchesSearch && matchesBrand && matchesGender && matchesPrice && matchesSillage && matchesLongevity && matchesPerfumer && matchesRating && matchesVotes && matchesAccords && matchesNotes;
                });

                // Sorting
                res.sort((a, b) => {
                    let valA, valB;
                    if (sortBy === 'rating') {
                        valA = a.rating || 0;
                        valB = b.rating || 0;
                    } else if (sortBy === 'votes') {
                        valA = a.num_votos || 0;
                        valB = b.num_votos || 0;
                    } else if (sortBy === 'price_val') {
                        const priceMap = { "way overpriced": 1, "overpriced": 2, "ok": 3, "good value": 4, "great value": 5 };
                        valA = priceMap[a.precio] || 0;
                        valB = priceMap[b.precio] || 0;
                    }

                    return sortOrder === 'desc' ? valB - valA : valA - valB;
                });

                return res;
            }, [data, searchTerm, selectedBrands, selectedGenders, selectedPrices, selectedSillage, selectedLongevity, selectedPerfumers, selectedAccords, selectedNotes, minRating, minVotes, sortBy, sortOrder]);

            const paginatedData = useMemo(() => {
                const start = (page - 1) * itemsPerPage;
                return filteredAndSortedData.slice(start, start + itemsPerPage);
            }, [filteredAndSortedData, page]);

            const totalPages = Math.ceil(filteredAndSortedData.length / itemsPerPage);

            const activeFiltersCount = selectedBrands.length + selectedGenders.length + selectedPrices.length + selectedSillage.length + selectedLongevity.length + selectedPerfumers.length + selectedAccords.length + selectedNotes.length + (minRating > 0 ? 1 : 0) + (minVotes > 0 ? 1 : 0);

            const clearFilters = () => {
                setSelectedBrands([]); setSelectedGenders([]); setSelectedPrices([]); setSelectedSillage([]); setSelectedLongevity([]); setSelectedPerfumers([]);
                setSelectedAccords([]); setSelectedNotes([]);
                setMinRating(0); setMinVotes(0);
                setPage(1);
            };

            return (
                <div className="flex flex-col lg:flex-row gap-6 animate-fade-in h-[calc(100vh-140px)]">
                    {/* Filters Sidebar */}
                    <div className={`lg:w-72 flex-shrink-0 bg-slate-900/95 backdrop-blur lg:bg-transparent fixed inset-0 z-30 lg:static transform transition-transform duration-300 ${showFilters ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'} p-6 lg:p-0 overflow-y-auto lg:overflow-visible border-r border-slate-800 lg:border-none`}>
                        <div className="flex justify-between items-center lg:hidden mb-6">
                            <h3 className="text-xl font-bold">Filtros</h3>
                            <button onClick={() => setShowFilters(false)}><Icon name="x" /></button>
                        </div>

                        <div className="glass-panel p-5 rounded-xl h-full overflow-y-auto custom-scrollbar">
                            <div className="flex justify-between items-center mb-4 sticky top-0 bg-[#1e293b] z-10 py-2 border-b border-slate-700">
                                <h3 className="font-bold text-white flex items-center gap-2"><Icon name="filter" size={18} /> Filtros</h3>
                                {activeFiltersCount > 0 && (
                                    <button
                                        onClick={clearFilters}
                                        className="text-xs text-indigo-400 hover:text-indigo-300 font-medium"
                                    >
                                        Limpiar ({activeFiltersCount})
                                    </button>
                                )}
                            </div>

                            <FilterSection title="Valoración">
                                <RangeFilter label="Mínimo Estrellas" min={0} max={5} step={0.1} value={minRating} onChange={setMinRating} />
                            </FilterSection>

                            <FilterSection title="Popularidad">
                                <RangeFilter label="Mínimo Votos" min={0} max={1000} step={50} value={minVotes} onChange={setMinVotes} />
                            </FilterSection>

                            <FilterSection title="Género">
                                <CheckboxList options={filterOptions.genders} selected={selectedGenders} onChange={(v) => handleFilterChange(setSelectedGenders, selectedGenders, v)} />
                            </FilterSection>

                            <FilterSection title="Precio">
                                <CheckboxList options={filterOptions.prices} selected={selectedPrices} onChange={(v) => handleFilterChange(setSelectedPrices, selectedPrices, v)} />
                            </FilterSection>

                            <FilterSection title="Duración">
                                <CheckboxList options={filterOptions.longevity} selected={selectedLongevity} onChange={(v) => handleFilterChange(setSelectedLongevity, selectedLongevity, v)} />
                            </FilterSection>

                            <FilterSection title="Estela">
                                <CheckboxList options={filterOptions.sillage} selected={selectedSillage} onChange={(v) => handleFilterChange(setSelectedSillage, selectedSillage, v)} />
                            </FilterSection>

                            <FilterSection title="Marca" isOpen={false}>
                                <CheckboxList options={filterOptions.brands} selected={selectedBrands} onChange={(v) => handleFilterChange(setSelectedBrands, selectedBrands, v)} search={true} />
                            </FilterSection>

                            <FilterSection title="Perfumista" isOpen={false}>
                                <CheckboxList options={filterOptions.perfumers} selected={selectedPerfumers} onChange={(v) => handleFilterChange(setSelectedPerfumers, selectedPerfumers, v)} search={true} />
                            </FilterSection>

                            <FilterSection title="Acordes" isOpen={false}>
                                <CheckboxList options={filterOptions.accords} selected={selectedAccords} onChange={(v) => handleFilterChange(setSelectedAccords, selectedAccords, v)} search={true} />
                            </FilterSection>

                            <FilterSection title="Notas" isOpen={false}>
                                <CheckboxList options={filterOptions.notes} selected={selectedNotes} onChange={(v) => handleFilterChange(setSelectedNotes, selectedNotes, v)} search={true} />
                            </FilterSection>
                        </div>
                    </div>

                    {/* Main List */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* Toolbar */}
                        <div className="flex flex-col md:flex-row gap-4 mb-4">
                            <div className="relative flex-1">
                                <div className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400">
                                    <Icon name="search" size={20} />
                                </div>
                                <input
                                    type="text"
                                    placeholder="Buscar fragancias, marcas, notas, perfumistas..."
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-indigo-500 transition-colors"
                                    value={searchTerm}
                                    onChange={(e) => { setSearchTerm(e.target.value); setPage(1); }}
                                />
                            </div>
                            <div className="flex gap-2">
                                <button
                                    className="lg:hidden px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-300"
                                    onClick={() => setShowFilters(true)}
                                >
                                    <Icon name="filter" size={20} />
                                </button>
                                <select
                                    className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-300 focus:outline-none focus:border-indigo-500"
                                    value={sortBy}
                                    onChange={(e) => setSortBy(e.target.value)}
                                >
                                    <option value="rating">Valoración</option>
                                    <option value="votes">Popularidad</option>
                                    <option value="price_val">Valor/Precio</option>
                                </select>
                                <button
                                    className="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-300 hover:text-white"
                                    onClick={() => setSortOrder(prev => prev === 'asc' ? 'desc' : 'asc')}
                                >
                                    <Icon name={sortOrder === 'asc' ? "arrow-up" : "arrow-down"} size={20} />
                                </button>
                            </div>
                        </div>

                        {/* Results Table */}
                        <div className="glass-panel rounded-xl flex-1 overflow-hidden flex flex-col">
                            <div className="overflow-x-auto flex-1 custom-scrollbar">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-800/50 text-slate-400 uppercase text-xs font-semibold sticky top-0 backdrop-blur z-10">
                                        <tr>
                                            <th className="p-4">Nombre</th>
                                            <th className="p-4">Marca</th>
                                            <th className="p-4">Género</th>
                                            <th className="p-4">Valoración</th>
                                            <th className="p-4 hidden md:table-cell">Duración</th>
                                            <th className="p-4 hidden md:table-cell">Estela</th>
                                            <th className="p-4">Precio</th>
                                            <th className="p-4"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700">
                                        {paginatedData.map((item, idx) => (
                                            <tr key={idx} className="hover:bg-slate-800/50 transition-colors group">
                                                <td className="p-4 font-medium text-white">{item.nombre_completo}</td>
                                                <td className="p-4 text-slate-300">{item.marca}</td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium whitespace-nowrap
                                                        ${translate('gender', item.genero) === 'Mujer' ? 'bg-pink-500/10 text-pink-400' :
                                                            translate('gender', item.genero) === 'Hombre' ? 'bg-blue-500/10 text-blue-400' :
                                                                'bg-purple-500/10 text-purple-400'}`}>
                                                        {translate('gender', item.genero)}
                                                    </span>
                                                </td>
                                                <td className="p-4">
                                                    <div className="flex items-center text-yellow-400">
                                                        <span className="font-bold mr-1">{item.rating}</span>
                                                        <Icon name="star" size={14} className="fill-current" />
                                                        <span className="text-xs text-slate-500 ml-2">({item.num_votos})</span>
                                                    </div>
                                                </td>
                                                <td className="p-4 text-slate-300 text-sm hidden md:table-cell">{translate('longevity', item.longevidad)}</td>
                                                <td className="p-4 text-slate-300 text-sm hidden md:table-cell">{translate('sillage', item.estela)}</td>
                                                <td className="p-4 text-slate-300 whitespace-nowrap">{translate('price', item.precio)}</td>
                                                <td className="p-4 text-right">
                                                    <button
                                                        onClick={() => onViewDetails(item)}
                                                        className="p-2 hover:bg-indigo-500/20 rounded-lg text-indigo-400 transition-colors opacity-0 group-hover:opacity-100"
                                                    >
                                                        <Icon name="chevron-right" size={20} />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {filteredAndSortedData.length === 0 && (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-500 p-8">
                                    <Icon name="search-x" size={48} className="mb-4 opacity-50" />
                                    <p>No se encontraron fragancias con estos filtros.</p>
                                    <button onClick={clearFilters} className="mt-4 text-indigo-400 hover:text-indigo-300 underline">Limpiar filtros</button>
                                </div>
                            )}

                            {/* Pagination */}
                            <div className="p-4 border-t border-slate-700 flex items-center justify-between bg-slate-800/30">
                                <span className="text-sm text-slate-400 hidden md:inline">
                                    Mostrando {filteredAndSortedData.length > 0 ? (page - 1) * itemsPerPage + 1 : 0} - {Math.min(page * itemsPerPage, filteredAndSortedData.length)} de {filteredAndSortedData.length}
                                </span>
                                <div className="flex gap-2 w-full md:w-auto justify-between md:justify-end">
                                    <button
                                        disabled={page === 1}
                                        onClick={() => setPage(p => p - 1)}
                                        className="px-4 py-2 bg-slate-800 rounded-lg text-sm disabled:opacity-50 hover:bg-slate-700 transition-colors flex items-center gap-2"
                                    >
                                        <Icon name="chevron-left" size={16} /> Anterior
                                    </button>
                                    <span className="text-sm text-slate-400 md:hidden flex items-center">
                                        {page} / {totalPages}
                                    </span>
                                    <button
                                        disabled={page >= totalPages}
                                        onClick={() => setPage(p => p + 1)}
                                        className="px-4 py-2 bg-slate-800 rounded-lg text-sm disabled:opacity-50 hover:bg-slate-700 transition-colors flex items-center gap-2"
                                    >
                                        Siguiente <Icon name="chevron-right" size={16} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DetailModal = ({ item, onClose }) => {
            if (!item) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-slate-900 border border-slate-700 w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl shadow-2xl custom-scrollbar" onClick={e => e.stopPropagation()}>
                        <div className="sticky top-0 bg-slate-900/95 backdrop-blur border-b border-slate-700 p-6 flex justify-between items-start z-10">
                            <div>
                                <h2 className="text-2xl font-bold text-white mb-1">{item.nombre_completo}</h2>
                                <p className="text-indigo-400 font-medium text-lg">{item.marca}</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-800 rounded-full transition-colors">
                                <Icon name="x" size={24} />
                            </button>
                        </div>

                        <div className="p-6 space-y-8">
                            {/* Stats Grid */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                    <div className="text-slate-400 text-xs uppercase mb-1 font-semibold tracking-wider">Valoración</div>
                                    <div className="text-2xl font-bold text-yellow-400 flex items-center">
                                        {item.rating} <Icon name="star" size={20} className="ml-1 fill-current" />
                                    </div>
                                    <div className="text-xs text-slate-500 mt-1">{item.num_votos} votos · {item.num_reviews || 0} reseñas</div>
                                </div>
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                    <div className="text-slate-400 text-xs uppercase mb-1 font-semibold tracking-wider">Duración</div>
                                    <div className="text-lg font-bold text-white">{translate('longevity', item.longevidad)}</div>
                                    <div className="w-full bg-slate-700 h-1.5 mt-2 rounded-full overflow-hidden">
                                        <div className="bg-indigo-500 h-full" style={{ width: `${(item.longevidad_pct || 0) * 100}%` }}></div>
                                    </div>
                                </div>
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                    <div className="text-slate-400 text-xs uppercase mb-1 font-semibold tracking-wider">Estela</div>
                                    <div className="text-lg font-bold text-white">{translate('sillage', item.estela)}</div>
                                    <div className="w-full bg-slate-700 h-1.5 mt-2 rounded-full overflow-hidden">
                                        <div className="bg-pink-500 h-full" style={{ width: `${(item.estela_pct || 0) * 100}%` }}></div>
                                    </div>
                                </div>
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                                    <div className="text-slate-400 text-xs uppercase mb-1 font-semibold tracking-wider">Precio</div>
                                    <div className="text-lg font-bold text-white">{translate('price', item.precio)}</div>
                                    <div className="w-full bg-slate-700 h-1.5 mt-2 rounded-full overflow-hidden">
                                        <div className="bg-emerald-500 h-full" style={{ width: `${(item.precio_pct || 0) * 100}%` }}></div>
                                    </div>
                                </div>
                            </div>

                            {/* Additional Info Row */}
                            <div className="grid md:grid-cols-2 gap-4">
                                {/* Perfumer */}
                                {item.perfumista && (
                                    <div className="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                                            <Icon name="flask-conical" size={16} /> Perfumista
                                        </h3>
                                        <p className="text-white font-medium">{item.perfumista}</p>
                                    </div>
                                )}

                                {/* Community Gender Vote */}
                                {item.voto_genero && (
                                    <div className="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                                            <Icon name="users" size={16} /> Voto de Género
                                        </h3>
                                        <div className="flex items-center gap-3">
                                            <span className={`px-3 py-1 rounded-full text-sm font-medium
                                                ${translate('gender', item.voto_genero) === 'Mujer' || translate('gender', item.voto_genero) === 'Femenino' ? 'bg-pink-500/20 text-pink-400' :
                                                    translate('gender', item.voto_genero) === 'Hombre' || translate('gender', item.voto_genero) === 'Masculino' ? 'bg-blue-500/20 text-blue-400' :
                                                        'bg-purple-500/20 text-purple-400'}`}>
                                                {translate('gender', item.voto_genero)}
                                            </span>
                                            <span className="text-white font-bold">{Math.round((item.voto_genero_pct || 0) * 100)}%</span>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Accords */}
                            <div>
                                <h3 className="text-lg font-semibold mb-4 flex items-center text-white">
                                    <Icon name="wind" size={20} className="mr-2 text-indigo-400" /> Acordes Principales
                                </h3>
                                <div className="flex flex-wrap gap-2">
                                    {String(item.main_accords || "").split(',').map((accord, idx) => (
                                        <span key={idx} className="px-4 py-1.5 bg-slate-800 border border-slate-700 hover:border-indigo-500/50 transition-colors rounded-full text-sm text-slate-300 capitalize">
                                            {translateText(accord.trim())}
                                        </span>
                                    ))}
                                </div>
                            </div>

                            {/* Notes */}
                            <div className="grid md:grid-cols-3 gap-6">
                                {item.notas_salida && (
                                    <div className="bg-slate-800/30 p-5 rounded-xl border border-slate-700/50">
                                        <h4 className="text-sm font-bold text-indigo-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                                            <Icon name="arrow-up-circle" size={16} /> Notas de Salida
                                        </h4>
                                        <p className="text-slate-300 leading-relaxed">{translateText(item.notas_salida)}</p>
                                    </div>
                                )}
                                {item.notas_corazon && (
                                    <div className="bg-slate-800/30 p-5 rounded-xl border border-slate-700/50">
                                        <h4 className="text-sm font-bold text-pink-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                                            <Icon name="heart" size={16} /> Notas de Corazón
                                        </h4>
                                        <p className="text-slate-300 leading-relaxed">{translateText(item.notas_corazon)}</p>
                                    </div>
                                )}
                                {item.notas_fondo && (
                                    <div className="bg-slate-800/30 p-5 rounded-xl border border-slate-700/50">
                                        <h4 className="text-sm font-bold text-amber-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                                            <Icon name="anchor" size={16} /> Notas de Fondo
                                        </h4>
                                        <p className="text-slate-300 leading-relaxed">{translateText(item.notas_fondo)}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---

        const App = () => {
            const [data, setData] = useState(null);
            const [view, setView] = useState('dashboard'); // dashboard, explorer
            const [selectedItem, setSelectedItem] = useState(null);

            // Load data from global variable
            useEffect(() => {
                if (window.FRAGRANCE_DATA) {
                    setData(window.FRAGRANCE_DATA);
                } else {
                    console.error("Data not found in window.FRAGRANCE_DATA");
                }
            }, []);

            // Lucide icons re-render fix - run on every render/update
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            if (!data) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white">
                        <div className="flex flex-col items-center animate-pulse">
                            <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p className="text-indigo-400 font-medium">Cargando Datos...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-900 text-slate-100">
                    {/* Navbar */}
                    <nav className="bg-slate-900/80 backdrop-blur border-b border-slate-800 sticky top-0 z-40">
                        <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-gradient-to-br from-indigo-500 to-pink-500 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                    <Icon name="droplet" size={20} className="text-white" />
                                </div>
                                <span className="font-bold text-xl tracking-tight">Fragrance<span className="text-indigo-400">Explorer</span></span>
                            </div>

                            <div className="flex gap-1 bg-slate-800 p-1 rounded-lg">
                                <button
                                    onClick={() => setView('dashboard')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${view === 'dashboard' ? 'bg-indigo-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                                >
                                    Dashboard
                                </button>
                                <button
                                    onClick={() => setView('explorer')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${view === 'explorer' ? 'bg-indigo-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                                >
                                    Explorador
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 container mx-auto px-4 py-8 overflow-hidden">
                        {view === 'dashboard' ? (
                            <Dashboard data={data} />
                        ) : (
                            <Explorer data={data} onViewDetails={setSelectedItem} />
                        )}
                    </main>

                    {/* Detail Modal */}
                    {selectedItem && (
                        <DetailModal item={selectedItem} onClose={() => setSelectedItem(null)} />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
